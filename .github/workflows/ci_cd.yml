# .github/workflows/ci_cd.yml
# Pipeline CI/CD — Build / Test / Deploy
# Secrets à configurer dans GitHub : Settings > Secrets and variables > Actions
#   - API_KEY          : clé API de l'application
#   - MLFLOW_RUN_ID    : run ID MLflow du modèle

name: CI/CD — Home Credit Scoring API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ──────────────────────────────────────────────
  # ÉTAPE 1 : BUILD — installation des dépendances
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"
          cache: "pip"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérification du linting (flake8)
        run: |
          pip install flake8
          flake8 api.py --max-line-length=100 --ignore=E501,W503

  # ──────────────────────────────────────────────
  # ÉTAPE 2 : TEST — pytest avec mocks MLflow
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build

    env:
      # Les secrets GitHub sont injectés comme variables d'env
      API_KEY: ${{ secrets.API_KEY }}
      MLFLOW_RUN_ID: ${{ secrets.MLFLOW_RUN_ID }}
      # En CI, on pointe vers un mlruns fictif (le modèle est mocké)
      MLFLOW_TRACKING_URI: file:///tmp/mlruns

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"
          cache: "pip"

      - name: Installation des dépendances
        run: pip install -r requirements.txt pytest httpx

      - name: Lancement des tests
        run: pytest tests/test_api.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Rapport de couverture
        run: |
          pip install pytest-cov
          pytest tests/test_api.py --cov=api --cov-report=term-missing

  # ──────────────────────────────────────────────
  # ÉTAPE 3 : DEPLOY — uniquement sur push main
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement
        env:
          API_KEY: ${{ secrets.API_KEY }}
          MLFLOW_RUN_ID: ${{ secrets.MLFLOW_RUN_ID }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          echo " Tests passés — déploiement en cours..."
          # Exemples selon la cible :
          # Heroku  : git push heroku main
          # Docker  : docker build -t scoring-api . && docker push registry/scoring-api
          