name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}   # ← secret dédié HF
        run: |
          git push -f https://ChristopheSalles31:${HF_TOKEN}@huggingface.co/spaces/ChristopheSalles31/ML_Ops_Credit_scoring main